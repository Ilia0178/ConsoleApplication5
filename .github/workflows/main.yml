name: CI/CD Pipeline

on: [push]

jobs:
  # ===================================================================
  # ЭТАП 1: СБОРКА (BUILD)
  # ===================================================================
  build_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Install C++ build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Run Build (make build)
        run: make build
        
      - name: Save compiled binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: prime_checker_binary
          path: prime_checker 

  # ===================================================================
  # ЭТАП 2: ТЕСТИРОВАНИЕ (TEST)
  # ===================================================================
  test_job:
    needs: build_job
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Download binary for testing
        uses: actions/download-artifact@v4
        with:
          name: prime_checker_binary
          path: ./ 
          
      - name: Run Tests (make test)
        run: |
          chmod +x prime_checker
          make test 

  # ===================================================================
  # ЭТАП 3: УПАКОВКА (PACKAGE)
  # ===================================================================
  package_job:
    needs: test_job
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev 

      - name: Run Package (make package)
        run: make package

      - name: Upload DEB package artifact
        uses: actions/upload-artifact@v4
        with:
          name: prime-checker-deb
          path: ./*.deb